{% extends 'base.html' %}
{% block title %}Delete Note &middot; MathsIsIt Notes{% endblock %}

{% block content %}
<section class="form-container" style="max-width: 480px;">
    <h1>Delete Note</h1>
    <p class="text-secondary mb-3">
        Are you sure you want to delete: <strong>{{ post.title }}</strong>?
    </p>
    <p class="text-muted">This action cannot be undone.</p>

    <form method="post" style="margin-top: 20px; display: flex; gap: 12px;">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">
            <i class="fas fa-trash"></i> Yes, Delete
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>
</section>
{% endblock %}
