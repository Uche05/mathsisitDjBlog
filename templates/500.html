{% extends 'base.html' %}
{% block title %}500 - Server Error &middot; MathsIsIt Notes{% endblock %}

{% block content %}
<div class="error-page" role="alert" aria-labelledby="err500">
    <div class="error-code">500</div>
    <h1 id="err500">Server Error</h1>
    <p class="text-secondary">
        Something went wrong on our end. Try going back home or contacting the site administrator.
    </p>
    <div style="margin-top: 24px;">
        <a class="btn btn-primary" href="{% url 'home' %}">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
